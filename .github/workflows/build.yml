name: Cross-Compilation Check

on: [push, pull_request]

jobs:
  verify-builds:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      - name: Install Go deps
        run: go get .

      - name: Verify compilation on Linux
        run: GOOS=linux GOARCH=amd64 go build -v ./...

      - name: Verify compilation on macOS (Intel & Apple Silicon)
        run: |
          GOOS=darwin GOARCH=amd64 go build -v ./...
          GOOS=darwin GOARCH=arm64 go build -v ./...

      - name: Verify compilation on Windows
        run: GOOS=windows GOARCH=amd64 go build -v ./...
